name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  TARGET_DIR: /opt/my-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to SWR (Public)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Custom Images
        run: |
          NAMESPACE="${{ vars.REGISTRY_NAMESPACE }}"
          REGISTRY="${{ vars.REGISTRY_URL }}"
          
          # 1. CourseBot Backend
          COURSEBOT_IMG="$REGISTRY/$NAMESPACE/coursebot:latest"
          docker build -t $COURSEBOT_IMG ./coursebot
          docker push $COURSEBOT_IMG
          
          # 2. Ingestor
          INGESTOR_IMG="$REGISTRY/$NAMESPACE/ingestor:latest"
          docker build -t $INGESTOR_IMG -f ./coursebot/Dockerfile.ingestor ./coursebot
          docker push $INGESTOR_IMG
          
          # 3. Retriever
          RETRIEVER_IMG="$REGISTRY/$NAMESPACE/retriever:latest"
          docker build -t $RETRIEVER_IMG -f ./coursebot/Dockerfile.retriever ./coursebot
          docker push $RETRIEVER_IMG

          # 4. Frontend (New: Multi-stage build in Dockerfile)
          FRONTEND_IMG="$REGISTRY/$NAMESPACE/frontend:latest"
          docker build -t $FRONTEND_IMG ./frontend
          docker push $FRONTEND_IMG

      - name: Proxy Third-party Images to SWR
        run: |
          # 定义需要搬运的镜像列表 (格式: 原始镜像|自定义后缀)
          IMAGES=(
            "ollama/ollama:0.5.4|ollama:0.5.4"
            "chromadb/chroma:1.5.8|chroma:1.5.8"
            "redis:7-alpine|redis:7-alpine"
            "nginx:trixie-perl|nginx:trixie-perl"
          )
          
          for img_pair in "${IMAGES[@]}"; do
            IFS="|" read -r SRC_IMG DEST_SUFFIX <<< "$img_pair"
            DEST_IMG="${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_NAMESPACE }}/$DEST_SUFFIX"
            
            echo "Proxying $SRC_IMG -> $DEST_IMG"
            docker pull $SRC_IMG
            docker tag $SRC_IMG $DEST_IMG
            docker push $DEST_IMG
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Code (for config files)
        uses: actions/checkout@v4

      - name: Construct Environment Config (.env) 
        run: |
          echo "ENVIRONMENT=production" > .env
          echo "SERVER_HOST=${{ vars.DEPLOY_HOST }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          
      - name: Update Kustomize Images
        run: |
          cd k8s/overlays/prod
          NAMESPACE="${{ vars.REGISTRY_NAMESPACE }}"
          REGISTRY="${{ vars.REGISTRY_INTERNAL_URL }}"
          
          # Custom Images
          kustomize edit set image sse-cloud-service_coursebot=$REGISTRY/$NAMESPACE/coursebot:latest
          kustomize edit set image sse-cloud-service_ingestor=$REGISTRY/$NAMESPACE/ingestor:latest
          kustomize edit set image sse-cloud-service_retriever=$REGISTRY/$NAMESPACE/retriever:latest
          kustomize edit set image frontend=$REGISTRY/$NAMESPACE/frontend:latest
          
          # Third-party proxy images (to pull from VPC)
          kustomize edit set image ollama/ollama:0.5.4=$REGISTRY/$NAMESPACE/ollama:0.5.4
          kustomize edit set image chromadb/chroma:1.5.8=$REGISTRY/$NAMESPACE/chroma:1.5.8
          kustomize edit set image redis:7-alpine=$REGISTRY/$NAMESPACE/redis:7-alpine
          kustomize edit set image nginx:trixie-perl=$REGISTRY/$NAMESPACE/nginx:trixie-perl

      - name: Copy Config Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,k8s/"
          target: ${{ env.TARGET_DIR }}
      
      - name: Remote Deployment Execution
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.TARGET_DIR }}
            
            # Create or update registry secret in Kubernetes
            kubectl create secret docker-registry swr-auth \
              --docker-server=${{ vars.REGISTRY_INTERNAL_URL }} \
              --docker-username=${{ secrets.REGISTRY_USERNAME }} \
              --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
              --dry-run=client -o yaml | kubectl apply -f -
            
            # Patch default service account to use the secret
            kubectl patch serviceaccount default -p '{"imagePullSecrets": [{"name": "swr-auth"}]}'
            
            # Apply Kustomize
            kubectl apply -k k8s/overlays/prod
            
            # Since K8s handles scaling and networking, Nginx config is automatically mapped as ConfigMap
            # Old images can be pruned by Kubelet automatically based on disk pressure.