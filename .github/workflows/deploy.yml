name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  TARGET_DIR: /opt/my-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to SWR (Public)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Custom Images
        run: |
          NAMESPACE="${{ vars.REGISTRY_NAMESPACE }}"
          REGISTRY="${{ vars.REGISTRY_URL }}"
          
          # 1. CourseBot Backend (Universal Image)
          COURSEBOT_IMG="$REGISTRY/$NAMESPACE/coursebot:latest"
          docker build -t $COURSEBOT_IMG ./coursebot
          docker push $COURSEBOT_IMG
          
          # 2. Frontend (Multi-stage build in Dockerfile)
          FRONTEND_IMG="$REGISTRY/$NAMESPACE/frontend:latest"
          docker build -t $FRONTEND_IMG ./frontend
          docker push $FRONTEND_IMG

      - name: Proxy Third-party Images to SWR
        run: |
          # 定义需要搬运的镜像列表 (格式: 原始镜像|自定义后缀)
          IMAGES=(
            "ollama/ollama:0.5.4|ollama:0.5.4"
            "chromadb/chroma:1.5.8|chroma:1.5.8"
            "redis:7-alpine|redis:7-alpine"
            "nginx:trixie-perl|nginx:trixie-perl"
            "prom/prometheus:v2.53.0|prometheus:v2.53.0"
            "grafana/grafana:11.1.0|grafana:11.1.0"
          )
          
          for img_pair in "${IMAGES[@]}"; do
            IFS="|" read -r SRC_IMG DEST_SUFFIX <<< "$img_pair"
            DEST_IMG="${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_NAMESPACE }}/$DEST_SUFFIX"
            
            echo "Proxying $SRC_IMG -> $DEST_IMG"
            docker pull $SRC_IMG
            docker tag $SRC_IMG $DEST_IMG
            docker push $DEST_IMG
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Code (for config files)
        uses: actions/checkout@v4

      - name: Construct Environment Config (.env) 
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
          
      - name: Update Kustomize Images
        run: |
          cd k8s/overlays/prod
          NAMESPACE="${{ vars.REGISTRY_NAMESPACE }}"
          REGISTRY="${{ vars.REGISTRY_INTERNAL_URL }}"
          
          # Custom Images
          kustomize edit set image sse-cloud-service_coursebot=$REGISTRY/$NAMESPACE/coursebot:latest
          kustomize edit set image frontend=$REGISTRY/$NAMESPACE/frontend:latest
          
          # Third-party proxy images (to pull from VPC)
          kustomize edit set image ollama/ollama:0.5.4=$REGISTRY/$NAMESPACE/ollama:0.5.4
          kustomize edit set image chromadb/chroma:1.5.8=$REGISTRY/$NAMESPACE/chroma:1.5.8
          kustomize edit set image redis:7-alpine=$REGISTRY/$NAMESPACE/redis:7-alpine
          kustomize edit set image nginx:trixie-perl=$REGISTRY/$NAMESPACE/nginx:trixie-perl
          kustomize edit set image prom/prometheus:v2.53.0=$REGISTRY/$NAMESPACE/prometheus:v2.53.0
          kustomize edit set image grafana/grafana:11.1.0=$REGISTRY/$NAMESPACE/grafana:11.1.0

      - name: Copy Config Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,k8s/"
          target: ${{ env.TARGET_DIR }}
      
      - name: Remote Deployment Execution
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.TARGET_DIR }}
            
            # Create or update registry secret in Kubernetes
            kubectl create secret docker-registry swr-auth \
              --docker-server=${{ vars.REGISTRY_INTERNAL_URL }} \
              --docker-username=${{ secrets.REGISTRY_USERNAME }} \
              --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
              --dry-run=client -o yaml | kubectl apply -f -
            
            # Patch default service account to use the secret
            kubectl patch serviceaccount default -p '{"imagePullSecrets": [{"name": "swr-auth"}]}'
            
            # Create the application secret directly from the .env file to bypass Kustomize path restrictions
            kubectl create secret generic cb-secrets \
              --from-env-file=.env \
              --dry-run=client -o yaml | kubectl apply -f -
            
            # Apply Kustomize
            kubectl apply -k k8s/overlays/prod
            
            # Force restart all Deployments to pick up new Secrets/ConfigMaps.
            # kubectl apply only updates the Secret object; running Pods must be
            # explicitly restarted to reload environment variables from Secrets.
            kubectl rollout restart deployment/coursebot
            kubectl rollout restart deployment/nginx-gateway
            kubectl rollout restart deployment/cb-ingestor
            kubectl rollout restart deployment/cb-retriever
            kubectl rollout restart deployment/frontend
            kubectl rollout restart deployment/prometheus-server
            kubectl rollout restart deployment/grafana
            
            # Wait for all rollouts to complete before marking deployment success
            kubectl rollout status deployment/coursebot --timeout=5m
            kubectl rollout status deployment/nginx-gateway --timeout=5m
            kubectl rollout status deployment/cb-ingestor --timeout=5m
            kubectl rollout status deployment/cb-retriever --timeout=5m
            kubectl rollout status deployment/frontend --timeout=5m
            kubectl rollout status deployment/prometheus-server --timeout=5m
            kubectl rollout status deployment/grafana --timeout=5m