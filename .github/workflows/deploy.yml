name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build CourseBot Docker Image
        run: |
          # 在当前 runner 构建它，此时 runner 完整的代码目录都还在
          docker build -t sse-cloud-service_coursebot:latest ./coursebot
          # 为节省远端构建资源，将生成的镜像存为 tar 包发向远端节点
          docker save -o coursebot.tar sse-cloud-service_coursebot:latest

      - name: Construct Environment Config (.env) 
        run: |
          echo "ENVIRONMENT=production" > .env
          echo "SERVER_HOST=8.166.134.186" >> .env
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env

      - name: Copy Files to Remote Server
        uses: appleboy/scp-action@master
        with:
          host: 8.166.134.186
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,docker-compose.prod.yml,nginx/default.conf,nginx/html,coursebot.tar"
          target: "/opt/my-server"
      
      - name: Deploy and Restart Services
        uses: appleboy/ssh-action@master
        with:
          host: 8.166.134.186
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m # 设置超时时间，防止模型过大下载过久阻塞并导致 Github Action 超时失败
          script: |
            # 进入工作目录
            cd /opt/my-server
            
            # 将传上来的生产专用配置重命名为标准 compose 文件以供后续运行使用
            mv docker-compose.prod.yml docker-compose.yml
            
            # 为了确保能够使用 load 进来的镜像，我们可以直接将旧的服务 down 掉
            docker compose down
            
            docker load -i coursebot.tar
            
            # 后台重启所有服务
            docker compose up -d
            
            # 等待 Ollama 启动
            timeout 30s bash -c 'until curl -s http://localhost:11434 > /dev/null; do echo "Waiting for Ollama API..."; sleep 2; done'

            # 确保 Ollama 自动拉取了我们需要的本地大模型
            docker exec -d cb_ollama ollama pull qwen2.5:0.5b
            
            # 清理临时包和历史无用镜像（悬空）
            rm coursebot.tar
            docker image prune -f
