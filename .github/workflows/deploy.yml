name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  SERVER_IP: 8.134.171.129
  TARGET_DIR: /opt/my-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Save Docker Images
        run: |
          # 1. CourseBot Gateway
          docker build -t sse-cloud-service_coursebot:latest ./coursebot
          docker save -o coursebot.tar sse-cloud-service_coursebot:latest
          
          # 2. Ingestor
          docker build -t sse-cloud-service_ingestor:latest -f ./coursebot/Dockerfile.ingestor ./coursebot
          docker save -o ingestor.tar sse-cloud-service_ingestor:latest
          
          # 3. Retriever
          docker build -t sse-cloud-service_retriever:latest -f ./coursebot/Dockerfile.retriever ./coursebot
          docker save -o retriever.tar sse-cloud-service_retriever:latest

      - name: Construct Environment Config (.env) 
        run: |
          echo "ENVIRONMENT=production" > .env
          echo "SERVER_HOST=${{ env.SERVER_IP }}" >> .env
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env

      - name: Copy Files to Remote Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,docker-compose.prod.yml,nginx/default.conf,nginx/html,coursebot.tar,ingestor.tar,retriever.tar"
          target: ${{ env.TARGET_DIR }}
      
      - name: Deploy and Restart Services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            cd ${{ env.TARGET_DIR }}
            
            # 使用生产环境配置
            mv docker-compose.prod.yml docker-compose.yml
            
            # 停止并清理旧服务
            docker compose down
            
            # 加载所有新镜像
            docker load -i coursebot.tar
            docker load -i ingestor.tar
            docker load -i retriever.tar
            
            # 启动服务
            docker compose up -d
            
            # 等待 Ollama 启动并预拉取模型
            echo "Waiting for Ollama API..."
            timeout 60s bash -c 'until curl -s http://localhost:11434 > /dev/null; do sleep 2; done'
            
            echo "Pulling models..."
            docker exec cb_ollama ollama pull qwen2.5:0.5b
            docker exec cb_ollama ollama pull bge-m3
            
            # 清理
            rm *.tar
            docker image prune -f
