name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  TARGET_DIR: /opt/my-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to ACR (Public)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Custom Images
        run: |
          NAMESPACE="${{ vars.REGISTRY_NAMESPACE }}"
          REGISTRY="${{ vars.REGISTRY_URL }}"
          
          # 1. CourseBot Backend
          COURSEBOT_IMG="$REGISTRY/$NAMESPACE/coursebot:latest"
          docker build -t $COURSEBOT_IMG ./coursebot
          docker push $COURSEBOT_IMG
          
          # 2. Ingestor
          INGESTOR_IMG="$REGISTRY/$NAMESPACE/ingestor:latest"
          docker build -t $INGESTOR_IMG -f ./coursebot/Dockerfile.ingestor ./coursebot
          docker push $INGESTOR_IMG
          
          # 3. Retriever
          RETRIEVER_IMG="$REGISTRY/$NAMESPACE/retriever:latest"
          docker build -t $RETRIEVER_IMG -f ./coursebot/Dockerfile.retriever ./coursebot
          docker push $RETRIEVER_IMG

          # 4. Frontend (New: Multi-stage build in Dockerfile)
          FRONTEND_IMG="$REGISTRY/$NAMESPACE/frontend:latest"
          docker build -t $FRONTEND_IMG ./frontend
          docker push $FRONTEND_IMG

      - name: Proxy Third-party Images to ACR
        run: |
          # 定义需要搬运的镜像列表 (格式: 原始镜像|自定义后缀)
          IMAGES=(
            "mariadb:10.6|mariadb:10.6"
            "wordpress:6-apache|wordpress:6-apache"
            "ollama/ollama:0.5.4|ollama:0.5.4"
            "chromadb/chroma:latest|chroma:latest"
            "redis:7-alpine|redis:7-alpine"
            "nginx:trixie-perl|nginx:trixie-perl"
          )
          
          for img_pair in "${IMAGES[@]}"; do
            IFS="|" read -r SRC_IMG DEST_SUFFIX <<< "$img_pair"
            DEST_IMG="${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_NAMESPACE }}/$DEST_SUFFIX"
            
            echo "Proxying $SRC_IMG -> $DEST_IMG"
            docker pull $SRC_IMG
            docker tag $SRC_IMG $DEST_IMG
            docker push $DEST_IMG
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (for config files)
        uses: actions/checkout@v4

      - name: Construct Environment Config (.env) 
        run: |
          echo "ENVIRONMENT=production" > .env
          echo "SERVER_HOST=${{ vars.DEPLOY_HOST }}" >> .env
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          
          # 关键：将所有镜像地址注入 .env，供 docker-compose 统一拉取
          # 服务器端拉取，所以使用 REGISTRY_INTERNAL_URL (VPC)
          NAMESPACE="${{ vars.REGISTRY_NAMESPACE }}"
          REGISTRY="${{ vars.REGISTRY_INTERNAL_URL }}"
          
          echo "IMAGE_COURSEBOT=$REGISTRY/$NAMESPACE/coursebot:latest" >> .env
          echo "IMAGE_INGESTOR=$REGISTRY/$NAMESPACE/ingestor:latest" >> .env
          echo "IMAGE_RETRIEVER=$REGISTRY/$NAMESPACE/retriever:latest" >> .env
          echo "IMAGE_FRONTEND=$REGISTRY/$NAMESPACE/frontend:latest" >> .env
          
          # 第三方代理镜像
          echo "IMAGE_DB=$REGISTRY/$NAMESPACE/mariadb:10.6" >> .env
          echo "IMAGE_WORDPRESS=$REGISTRY/$NAMESPACE/wordpress:6-apache" >> .env
          echo "IMAGE_OLLAMA=$REGISTRY/$NAMESPACE/ollama:0.5.4" >> .env
          echo "IMAGE_CHROMA=$REGISTRY/$NAMESPACE/chroma:latest" >> .env
          echo "IMAGE_REDIS=$REGISTRY/$NAMESPACE/redis:7-alpine" >> .env
          echo "IMAGE_NGINX=$REGISTRY/$NAMESPACE/nginx:trixie-perl" >> .env

      - name: Copy Config Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 只传输配置文件
          source: ".env,docker-compose.prod.yml,nginx/prod.conf"
          target: ${{ env.TARGET_DIR }}
      
      - name: Remote Deployment Execution
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.TARGET_DIR }}
            
            # 登录阿里云 ACR (服务器端使用 VPC 地址，极速且免外网流量)
            docker login --username=${{ secrets.REGISTRY_USERNAME }} --password=${{ secrets.REGISTRY_PASSWORD }} ${{ vars.REGISTRY_INTERNAL_URL }}
            
            # 预清理：删除未使用的悬挂镜像，释放空间
            docker image prune -f
            
            # 使用生产环境配置文件进行拉取 and 部署 (不采用 mv 方式更稳健)
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            # 等待 Ollama 启动并预拉取模型
            echo "Waiting for Ollama API..."
            timeout 60s bash -c 'until curl -s http://localhost:11434 > /dev/null; do sleep 2; done'
            
            echo "Pulling models..."
            docker exec cb_ollama ollama pull qwen2.5:0.5b
            docker exec cb_ollama ollama pull bge-m3
            
            # 后清理：删除旧版本的镜像层
            docker image prune -f