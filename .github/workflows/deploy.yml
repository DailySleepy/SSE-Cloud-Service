name: Deploy to Server via ACR

on:
  push:
    branches:
      - main

env:
  TARGET_DIR: /opt/my-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to ACR (Public)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Images
        run: |
          # 定义完整的镜像名变量
          COURSEBOT_IMG="${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_NAMESPACE }}/coursebot:latest"
          INGESTOR_IMG="${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_NAMESPACE }}/ingestor:latest"
          RETRIEVER_IMG="${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_NAMESPACE }}/retriever:latest"

          # 1. CourseBot Gateway
          docker build -t $COURSEBOT_IMG ./coursebot
          docker push $COURSEBOT_IMG
          
          # 2. Ingestor
          docker build -t $INGESTOR_IMG -f ./coursebot/Dockerfile.ingestor ./coursebot
          docker push $INGESTOR_IMG
          
          # 3. Retriever
          docker build -t $RETRIEVER_IMG -f ./coursebot/Dockerfile.retriever ./coursebot
          docker push $RETRIEVER_IMG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (for config files)
        uses: actions/checkout@v4

      - name: Construct Environment Config (.env) 
        run: |
          echo "ENVIRONMENT=production" > .env
          echo "SERVER_HOST=${{ vars.DEPLOY_HOST }}" >> .env
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          
          # 关键：将镜像地址注入 .env，供 docker-compose 使用
          # 服务器端拉取，所以使用 VPC 地址
          echo "IMAGE_COURSEBOT=${{ vars.REGISTRY_INTERNAL_URL }}/${{ vars.REGISTRY_NAMESPACE }}/coursebot:latest" >> .env
          echo "IMAGE_INGESTOR=${{ vars.REGISTRY_INTERNAL_URL }}/${{ vars.REGISTRY_NAMESPACE }}/ingestor:latest" >> .env
          echo "IMAGE_RETRIEVER=${{ vars.REGISTRY_INTERNAL_URL }}/${{ vars.REGISTRY_NAMESPACE }}/retriever:latest" >> .env

      - name: Copy Config Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 不再传输大体积的 .tar 文件！只传配置文件
          source: ".env,docker-compose.prod.yml,nginx/default.conf,nginx/html"
          target: ${{ env.TARGET_DIR }}
      
      - name: Remote Deployment Execution
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.TARGET_DIR }}
            
            # 登录阿里云 ACR (服务器端使用 VPC 地址，极速且免外网流量)
            docker login --username=${{ secrets.REGISTRY_USERNAME }} --password=${{ secrets.REGISTRY_PASSWORD }} ${{ vars.REGISTRY_INTERNAL_URL }}
            
            # 预清理：删除未使用的悬挂镜像，释放空间
            docker image prune -f
            
            # 使用生产环境配置文件进行拉取 and 部署 (不采用 mv 方式更稳健)
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            # 等待 Ollama 启动并预拉取模型
            echo "Waiting for Ollama API..."
            timeout 60s bash -c 'until curl -s http://localhost:11434 > /dev/null; do sleep 2; done'
            
            echo "Pulling models..."
            docker exec cb_ollama ollama pull qwen2.5:0.5b
            docker exec cb_ollama ollama pull bge-m3
            
            # 后清理：删除旧版本的镜像层
            docker image prune -f