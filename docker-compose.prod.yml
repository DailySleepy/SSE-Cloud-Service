services:
  db:
    image: ${IMAGE_DB}
    container_name: mdb_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - my_network

  wordpress:
    image: ${IMAGE_WORDPRESS}
    container_name: wp_app
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME','http://${SERVER_HOST:-localhost}/blog');
        define('WP_SITEURL','http://${SERVER_HOST:-localhost}/blog');
        $$_SERVER['REQUEST_URI'] = str_replace("/wp-admin/", "/blog/wp-admin/", $$_SERVER['REQUEST_URI']);
    volumes:
      - wp_data:/var/www/html
    networks:
      - my_network

  coursebot:
    # 关键修改：使用 GitHub Action 传过来的变量
    image: ${IMAGE_COURSEBOT}
    container_name: cb_app
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_URL=redis://cb_redis:6379/0
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - RETRIEVER_URL=http://cb_retriever:8000
      # 修正了 NO_PROXY 中的容器名，确保与下面的 container_name 一致
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,cb_app,cb_ingestor,localhost,127.0.0.1
    depends_on:
      - cb_redis
      - cb_ollama
      - cb_chroma
      - cb_retriever
    networks:
      - my_network

  cb_ollama:
    image: ${IMAGE_OLLAMA}
    container_name: cb_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - my_network

  cb_ollama_init:
    image: ${IMAGE_OLLAMA}
    container_name: cb_ollama_init
    networks:
      - my_network
    depends_on:
      - cb_ollama
    environment:
      - OLLAMA_HOST=http://cb_ollama:11434
    restart: "no"
    command: >
      sh -c "
        echo 'Wait for Ollama server...';
        while ! ollama list > /dev/null 2>&1; do
          sleep 2;
        done;
        echo 'Pulling bge-m3 (embedding model)...';
        ollama pull bge-m3;
        echo 'Pulling qwen2.5:0.5b (local LLM)...';
        ollama pull qwen2.5:0.5b;
        echo 'Models pulled successfully!';
      "

  cb_chroma:
    image: ${IMAGE_CHROMA}
    container_name: cb_chroma
    restart: always
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
    volumes:
      - chroma_data:/data
    networks:
      - my_network

  cb_ingestor:
    image: ${IMAGE_INGESTOR}
    container_name: cb_ingestor
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,cb_app,cb_ingestor,localhost,127.0.0.1
      - REDIS_URL=redis://cb_redis:6379/0
    depends_on:
      - cb_ollama
      - cb_chroma
      - cb_redis
    networks:
      - my_network

  cb_retriever:
    image: ${IMAGE_RETRIEVER}
    container_name: cb_retriever
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,cb_app,cb_ingestor,localhost,127.0.0.1
    depends_on:
      - cb_ollama
      - cb_chroma
    networks:
      - my_network

  cb_redis:
    image: ${IMAGE_REDIS}
    container_name: cb_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - my_network

  frontend:
    image: ${IMAGE_FRONTEND}
    container_name: cb_frontend
    restart: always
    networks:
      - my_network

  nginx:
    image: ${IMAGE_NGINX}
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wordpress
      - coursebot
      - frontend
    networks:
      - my_network

volumes:
  db_data:
  wp_data:
  ollama_data:
  redis_data:
  chroma_data: # 新增了 chroma 的持久化卷

networks:
  my_network:
    driver: bridge