server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;

    # 通用代理头部配置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 增加超时限制，适配大模型响应与长文档处理
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    # =========== 代理到 WordPress ===========
    location ^~ /blog/ {
        proxy_pass http://wordpress:80/;
        proxy_redirect off;
    }

    location = /blog {
        return 301 /blog/;
    }

    # =========== 代理到 CourseBot (FastAPI) ===========
    location /v1/chat/completions {
        proxy_pass http://coursebot:8000/v1/chat/completions;
        proxy_buffering off;
        proxy_cache off;
    }

    location /v1/ingest {
        proxy_pass http://cb_ingestor:8000;
    }

    location /v1/retrieve {
        proxy_pass http://cb_retriever:8000;
    }

    location /v1/rag {
        proxy_pass http://coursebot:8000/v1/rag;
    }

    location /healthz {
        proxy_pass http://coursebot:8000/healthz;
    }
    location /readyz {
        proxy_pass http://coursebot:8000/readyz;
    }

    # =========== 代理到 Frontend (Production Container) ===========
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
