<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSU-SSE Gateway</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --text-main: #f8fafc;
            --accent: #5C8347;
            /* 中山大学经典翠绿，或者你可以理解为生机勃勃的颜色 */
            --accent-glow: rgba(92, 131, 71, 0.4);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 3rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--accent-glow);
            transform: translateY(20px);
            animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .sysu-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #456d33);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 500px;
            margin: 0 auto 2.5rem;
            line-height: 1.6;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.8rem;
        }

        .feature-title {
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
        }

        .feature-desc {
            font-size: 0.9rem;
            color: #64748b;
        }

        /* 动态背景修饰 */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: pulse 8s infinite alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(92, 131, 71, 0.15);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(56, 189, 248, 0.1);
            bottom: -50px;
            right: -50px;
            animation-delay: -4s;
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(20px, 20px);
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="sysu-badge">SYSU-SSE</div>
        <h1>SSE Cloud Service</h1>
        <p>欢迎来到云原生与服务计算联合实验环境。所有核心微服务架构均已准备就绪并平稳运行。</p>

        <div class="features">
            <a href="/blog/" class="feature-card">
                <div class="feature-icon">📝</div>
                <div class="feature-title">技术博客</div>
                <div class="feature-desc">访问 WordPress 服务</div>
            </a>

            <a href="/healthz" class="feature-card">
                <div class="feature-icon">🤖</div>
                <div class="feature-title">CourseBot API</div>
                <div class="feature-desc">FastAPI LLM 代理网关</div>
            </a>
        </div>
    </div>
</body>

</html>
