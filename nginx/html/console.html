<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gateway & RAG 控制台 - SYSU-SSE</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #5C8347;
            --accent-glow: rgba(92, 131, 71, 0.4);
            --danger: #ef4444;
            --success: #22c55e;
        }

        /* 自定义滚动条风格 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(92, 131, 71, 0.4);
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(92, 131, 71, 0.8);
            border: 2px solid transparent;
            background-clip: content-box;
        }

        /* 隐藏数字输入框的上下箭头 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .hidden {
            display: none !important;
        }

        body,
        html {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 800px;
            max-width: 95%;
            margin: 2rem auto;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            animation: fadeIn 0.8s ease-out;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #e2e8f0;
        }

        .sub-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            margin-top: -1rem;
        }

        /* Forms */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        select,
        textarea,
        input[type="text"],
        input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-main);
            padding: 0.8rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select:focus,
        textarea:focus,
        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* RAG Toggle */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, var(--accent), #456d33);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            width: auto;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* Drag and Drop Zone */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 1rem;
        }

        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(92, 131, 71, 0.05);
        }

        .drop-zone p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Document List */
        .doc-list {
            margin-top: 1rem;
        }

        .doc-item {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .doc-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .doc-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f1f5f9;
        }

        .doc-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .doc-actions {
            display: flex;
            gap: 0.5rem;
        }

        .doc-content {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            line-height: 1.5;
            color: #cbd5e1;
            display: none;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Chat Results */
        .result-panel {
            margin-top: 1.5rem;
            display: none;
        }

        .result-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .meta-tag.cached {
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .meta-tag.rag {
            color: #7dd3fc;
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        .result-content {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e2e8f0;
            white-space: pre-wrap;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .citations {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 0.75rem;
        }

        .citation-item {
            margin-bottom: 0.4rem;
        }

        /* Helpers */
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60% {
                content: '...';
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Background Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            animation: pulse 12s infinite alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(92, 131, 71, 0.1);
            top: -200px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(14, 165, 233, 0.05);
            bottom: -100px;
            right: -50px;
        }

        @keyframes pulse {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 20px) scale(1.1);
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <a href="/" class="back-link">← 返回主页</a>

        <div class="content-stack">
            <!-- Top: Chat Playground -->
            <div class="card">
                <h2>💬 对话 Playground</h2>
                <p class="sub-title">测试模型路由与 RAG 知识检索增强能力。</p>

                <div class="input-group">
                    <label>推理模型后端:</label>
                    <select id="modelSelect">
                        <option value="ollama/qwen2.5:0.5b">Ollama: Qwen 2.5 (本地 0.5B)</option>
                        <option value="saas/openrouter/auto">SaaS: OpenRouter (Auto)</option>
                    </select>
                </div>

                <div class="toggle-wrapper" style="flex-direction: column; align-items: stretch; gap: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>启用 RAG 知识检索增强</span>
                        <label class="switch">
                            <input type="checkbox" id="ragToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div id="topKWrapper"
                        style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.75rem;">
                        <span style="font-size: 0.85rem; color: var(--text-muted);">检索数量 (Top-K)</span>
                        <input type="number" id="topKInput" value="3" min="1" max="10"
                            style="width: 60px; padding: 0.3rem; text-align: center;">
                    </div>
                </div>

                <div class="input-group">
                    <label>输入指令:</label>
                    <textarea id="promptInput" rows="4" placeholder="向 AI 提问，如果启用了 RAG，它会参考右侧上传的文档..."></textarea>
                </div>

                <button class="btn" id="submitBtn">✨ 发起调用请求</button>

                <div class="result-panel" id="resultPanel">
                    <div class="result-meta" id="resultMeta"></div>
                    <div class="result-content" id="resultContent"></div>
                    <div class="citations" id="citations" style="display: none;">
                        <strong>📚 参考引文:</strong>
                        <div id="citationsList"></div>
                    </div>
                </div>
            </div>

            <!-- Bottom: Knowledge Base Management -->
            <div class="card" id="ragManagementCard" style="padding: 1.5rem;">
                <h2>📁 知识库管理</h2>

                <div class="drop-zone" id="dropZone">
                    <div style="font-size: 2rem; margin-bottom: 0.5rem;">📄</div>
                    <p>点击或拖拽文件到此处上传</p>
                    <p style="font-size: 0.75rem; opacity: 0.7;">支持 .txt, .pdf, .md</p>
                    <input type="file" id="fileInput" hidden accept=".txt,.pdf,.md">
                </div>

                <div id="uploadStatus"
                    style="font-size: 0.8rem; margin-bottom: 1rem; text-align: center; display: none;"></div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="margin: 0; font-size: 0.9rem; color: var(--text-muted);">已存文档</h3>
                    <button class="btn" style="width: auto; padding: 0.3rem 0.6rem; font-size: 0.75rem;"
                        id="refreshDocsBtn">刷新</button>
                </div>



                <div class="doc-list" id="docList">
                    <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 1rem;">
                        加载中<span class="loading-dots"></span></div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script>
        // --- UI Elements ---
        const submitBtn = document.getElementById('submitBtn');
        const ragToggle = document.getElementById('ragToggle');
        const modelSelect = document.getElementById('modelSelect');
        const promptInput = document.getElementById('promptInput');
        const resultPanel = document.getElementById('resultPanel');
        const resultMeta = document.getElementById('resultMeta');
        const resultContent = document.getElementById('resultContent');
        const citationsArea = document.getElementById('citations');
        const citationsList = document.getElementById('citationsList');

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const docList = document.getElementById('docList');
        const refreshDocsBtn = document.getElementById('refreshDocsBtn');

        const uploadStatus = document.getElementById('uploadStatus');
        const ragManagementCard = document.getElementById('ragManagementCard');

        // --- UI Visibility Logic ---
        ragToggle.addEventListener('change', () => {
            if (ragToggle.checked) {
                ragManagementCard.classList.remove('hidden');
                document.getElementById('topKWrapper').classList.remove('hidden');
            } else {
                ragManagementCard.classList.add('hidden');
                document.getElementById('topKWrapper').classList.add('hidden');
            }
        });
        // 初始状态同步
        if (!ragToggle.checked) {
            ragManagementCard.classList.add('hidden');
            document.getElementById('topKWrapper').classList.add('hidden');
        }

        // --- Chat Logic ---
        submitBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '思考中...';
            resultPanel.style.display = 'block';
            const loadingText = ragToggle.checked ? '正在检索知识并生成回答...' : '正在生成回答...';
            resultContent.textContent = loadingText;
            resultMeta.innerHTML = '';
            citationsArea.style.display = 'none';

            const payload = {
                model: modelSelect.value,
                messages: [{ role: "user", content: prompt }],
                use_rag: ragToggle.checked,
                top_k: parseInt(document.getElementById('topKInput').value) || 3
            };

            const startTime = Date.now();

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const totalTime = Date.now() - startTime;

                if (!response.ok) {
                    resultMeta.innerHTML = `<span class="meta-tag" style="border-color: var(--danger); color: var(--danger);">错误 ${response.status}</span>`;
                    resultContent.textContent = data.detail || JSON.stringify(data.error || data);
                    return;
                }

                const reply = data.choices[0]?.message?.content || "无返回。";
                const isCached = data._meta?.cached;
                const latency = data.usage?.latency_ms;
                const citations = data.citations || [];

                let metaHtml = `<span class="meta-tag">端到端: ${totalTime}ms</span>`;
                if (latency) metaHtml += `<span class="meta-tag">推理: ${latency}ms</span>`;
                if (isCached) metaHtml += `<span class="meta-tag cached">⚡ Redis 命中</span>`;
                if (ragToggle.checked) metaHtml += `<span class="meta-tag rag">📚 RAG 已启用</span>`;

                resultMeta.innerHTML = metaHtml;
                resultContent.textContent = reply;

                if (citations.length > 0) {
                    citationsArea.style.display = 'block';
                    citationsList.innerHTML = citations.map((c, i) => {
                        const dots = c.text.length > 100 ? "..." : "";
                        const text = c.text.substring(0, 100) + dots;
                        return `<div class="citation-item"><strong>[${i + 1}]</strong> ${c.source}: <em>"${text}"</em></div>`
                    }).join('');
                }

            } catch (err) {
                resultContent.textContent = "网络异常: " + err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '✨ 发起调用请求';
            }
        });

        // --- 键盘快捷键逻辑 ---
        promptInput.addEventListener('keydown', (e) => {
            // 检查是否按下 Enter 键，且没有按下 Shift 键
            if (e.key === 'Enter' && !e.shiftKey) {
                // 阻止默认的换行行为
                e.preventDefault();

                // 如果按钮没有禁用（不在思考中），则触发点击发送
                if (!submitBtn.disabled) {
                    submitBtn.click();
                }
            }
        });

        // --- Document Management Logic ---

        async function fetchDocs() {
            try {
                const response = await fetch(`/v1/rag/docs?show_content=true`);
                const data = await response.json();

                if (data.documents.length === 0) {
                    docList.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 1rem;">知识库为空</div>';
                    return;
                }

                docList.innerHTML = data.documents.map((doc, idx) => `
                    <div class="doc-item">
                        <div class="doc-header">
                            <div class="doc-info">
                                <span class="doc-name">${doc.source}</span>
                                <span class="doc-meta">${doc.chunk_count} 个切片</span>
                            </div>
                            <div class="doc-actions">
                                <button class="btn btn-danger" onclick="deleteDoc('${doc.source}')">删除</button>
                            </div>
                        </div>
                        <div class="doc-content" id="content-${idx}" style="display: none">${doc.chunks.map(c => c.text).join('\n\n--- Next Chunk ---\n\n')}</div>
                        <button class="btn" style="background: transparent; border: none; color: var(--accent); padding: 0.2rem 0; width: auto; font-size: 0.75rem;" 
                                onclick="toggleContent('${idx}')">
                            查看内容
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                docList.innerHTML = '<div style="text-align: center; color: var(--danger); font-size: 0.8rem; padding: 1rem;">加载失败</div>';
            }
        }

        async function deleteDoc(source) {
            if (!confirm(`确定要删除文档 "${source}" 吗？此操作不可逆。`)) return;
            try {
                const response = await fetch(`/v1/rag/docs/${encodeURIComponent(source)}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchDocs();
                } else {
                    alert("删除失败");
                }
            } catch (err) {
                alert("异常: " + err.message);
            }
        }

        function toggleContent(id) {
            const el = document.getElementById(`content-${id}`);
            const btn = el.nextElementSibling;
            if (el.style.display === 'none') {
                el.style.display = 'block';
                btn.textContent = '收起内容';
            } else {
                el.style.display = 'none';
                btn.textContent = '查看内容';
            }
        }


        refreshDocsBtn.addEventListener('click', fetchDocs);

        // --- File Upload Logic ---

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleUpload(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleUpload(e.target.files[0]);
        });

        async function handleUpload(file) {
            // 预检：10MB 限制
            if (file.size > 10 * 1024 * 1024) {
                uploadStatus.style.display = 'block';
                uploadStatus.style.color = 'var(--danger)';
                uploadStatus.textContent = '❌ 失败: 文件大小不能超过 10MB';
                return;
            }

            uploadStatus.style.display = 'block';
            uploadStatus.style.color = 'var(--text-muted)';
            uploadStatus.innerHTML = `正在上传 ${file.name}<span class="loading-dots"></span>`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/v1/ingest/file', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    uploadStatus.style.color = 'var(--success)';
                    uploadStatus.textContent = '✅ 上传成功！';
                    setTimeout(() => { uploadStatus.style.display = 'none'; }, 3000);
                    fetchDocs();
                } else {
                    let errorMessage = "服务器内部错误";
                    try {
                        const error = await response.json();
                        errorMessage = error.detail || JSON.stringify(error);
                    } catch (parseError) {
                        // 如果后端返回非 JSON（例如 Nginx 的 413 Payload Too Large HTML）
                        errorMessage = `HTTP ${response.status} ${response.statusText}`;
                    }
                    uploadStatus.style.color = 'var(--danger)';
                    uploadStatus.textContent = '❌ 失败: ' + errorMessage;
                }
            } catch (err) {
                uploadStatus.style.color = 'var(--danger)';
                uploadStatus.textContent = '❌ 网络异常或链接超时';
            }
        }

        // --- Init ---
        fetchDocs();
    </script>
</body>

</html>
