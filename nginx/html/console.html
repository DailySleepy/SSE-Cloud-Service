<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gateway 控制台 - SYSU-SSE</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --text-main: #f8fafc;
            --accent: #5C8347;
            --accent-glow: rgba(92, 131, 71, 0.4);
        }

        body,
        html {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 3rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--accent-glow);
            transform: translateY(20px);
            animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            width: 700px;
            max-width: 90%;
        }

        /* Playground Styles */
        .playground {
            text-align: left;
        }

        .playground h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .playground p.sub-title {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #f8fafc;
            padding: 0.8rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--accent), #456d33);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--accent-glow);
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result-panel {
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 1.2rem;
            display: none;
        }

        .result-meta {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.8rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
        }

        .meta-tag.cached {
            background: rgba(92, 131, 71, 0.2);
            color: #86efac;
            border: 1px solid rgba(92, 131, 71, 0.4);
        }

        .meta-tag.error {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .result-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .back-link {
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: left;
            width: 100%;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* 动态背景修饰 */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: pulse 8s infinite alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(92, 131, 71, 0.15);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(56, 189, 248, 0.1);
            bottom: -50px;
            right: -50px;
            animation-delay: -4s;
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(20px, 20px);
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        <div class="playground">
            <h2>✨ AI Gateway 控制台</h2>
            <p class="sub-title">在这里测试大模型路由、缓存和响应能力。</p>
            <div class="input-group">
                <label for="modelSelect">选择推理模型后端 (Provider Routing):</label>
                <select id="modelSelect">
                    <option value="ollama/qwen2.5:0.5b">Ollama: Qwen 2.5 (本地 0.5B, 含 Redis 缓存)</option>
                    <option value="saas/openrouter/auto">SaaS: OpenRouter (auto 模型)</option>
                    <option value="abc/xxx">错误测试: 调用"abc/xxx", 触发网关 400 校验</option>
                </select>
            </div>
            <div class="input-group">
                <label for="promptInput">输入指令 (Prompt):</label>
                <textarea id="promptInput" placeholder="例如：请用一句话解释容器的主流技术栈。"></textarea>
            </div>
            <button class="submit-btn" id="submitBtn">发起调用请求</button>

            <div class="result-panel" id="resultPanel">
                <div class="result-meta" id="resultMeta">
                    <!-- Metadata will be populated here -->
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('submitBtn');
        const modelSelect = document.getElementById('modelSelect');
        const promptInput = document.getElementById('promptInput');
        const resultPanel = document.getElementById('resultPanel');
        const resultMeta = document.getElementById('resultMeta');
        const resultContent = document.getElementById('resultContent');

        btn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // UI 锁定
            btn.disabled = true;
            btn.textContent = '思考中...';
            resultPanel.style.display = 'block';
            resultContent.textContent = '';
            resultMeta.innerHTML = '<span class="meta-tag">发起网络连接...</span>';

            const payload = {
                model: modelSelect.value,
                messages: [{ role: "user", content: prompt }]
            };

            const startTime = Date.now();

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const totalTime = Date.now() - startTime;

                if (!response.ok) {
                    resultMeta.innerHTML = `<span class="meta-tag error">HTTP ${response.status}</span> <span class="meta-tag">${totalTime}ms</span>`;
                    resultContent.textContent = JSON.stringify(data.error || data, null, 2);
                    return;
                }

                // 成功渲染
                const reply = data.choices[0]?.message?.content || "无返回文字。";
                const isCached = data._meta?.cached;
                const latency = data.usage?.latency_ms !== undefined ? data.usage.latency_ms + "ms (端到端)" : "";
                const tokens = data.usage?.total_tokens !== undefined ? `${data.usage.total_tokens} tokens` : "";

                let metaHtml = `<span class="meta-tag">耗时: ${totalTime}ms (网络)</span>`;
                if (latency) metaHtml += `<span class="meta-tag">推理耗时: ${latency}</span>`;
                if (tokens) metaHtml += `<span class="meta-tag">${tokens}</span>`;
                if (isCached) metaHtml += `<span class="meta-tag cached">⚡ Redis 命中</span>`;

                resultMeta.innerHTML = metaHtml;
                resultContent.textContent = reply;

            } catch (err) {
                resultMeta.innerHTML = `<span class="meta-tag error">网络错误</span>`;
                resultContent.textContent = err.toString();
            } finally {
                btn.disabled = false;
                btn.textContent = '发起调用请求';
            }
        });
    </script>
</body>

</html>
