<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SSE-Cloud-Service | Dev Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-300">
    <div class="max-w-md w-full p-8 border border-slate-800 rounded-xl bg-slate-900/50">
        <h1 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
            <span class="w-3 h-3 bg-emerald-500 rounded-full"></span> 
            后端服务已就绪
        </h1>
        
        <div class="space-y-6">
            <div>
                <p class="text-sm text-slate-500 mb-2">STEP 1: 启动前端</p>
                <code class="block bg-black p-3 rounded border border-slate-700 text-emerald-400">
                    npm run dev
                </code>
            </div>

            <div>
                <p class="text-sm text-slate-500 mb-2">STEP 2: 访问应用</p>
                <a href="http://localhost:5173" class="block text-center bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded transition-colors">
                    打开 http://localhost:5173
                </a>
            </div>
        </div>
    </div>
</body>
</html>
