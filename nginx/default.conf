server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;

    # 通用代理头部配置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 增加超时限制，适配大模型响应与长文档处理
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    # =========== 代理到 WordPress ===========
    # /blog 被挂载到了 wordpress 的根路径
    location ^~ /blog/ {
        # 注意: 结尾的 / 表示将 URI 中的 /blog 剔除后传递到后端
        proxy_pass http://wordpress:80/;
        proxy_redirect off;
    }

    # 兼容没有结尾斜杠的情况
    location = /blog {
        return 301 /blog/;
    }

    # =========== 代理到 CourseBot (FastAPI) ===========
    # 对接 OpenRouter 的 OpenAI 标准 API
    location /v1/chat/completions {
        proxy_pass http://coursebot:8000/v1/chat/completions;
        # 支持流式输出，禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }

    # 代理到 Ingestor 服务
    location /v1/ingest {
        proxy_pass http://cb_ingestor:8000;
    }

    # 代理到 Retriever 服务
    location /v1/retrieve {
        proxy_pass http://cb_retriever:8000;
    }

    # RAG 知识库管理 API (通过 Gateway)
    location /v1/rag {
        proxy_pass http://coursebot:8000/v1/rag;
    }

    # API 存活与就绪探针
    location /healthz {
        proxy_pass http://coursebot:8000/healthz;
    }
    location /readyz {
        proxy_pass http://coursebot:8000/readyz;
    }

    # =========== 默认根路由处理 ===========
    # 提供 SYSU-SSE 自定义引导页
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 默认 50x.html 可能会掩盖后端真实的 500/504 报错 (导致 404)
    # error_page 500 502 503 504 /50x.html;
    # location = /50x.html {
    #    root /usr/share/nginx/html;
    # }
}
