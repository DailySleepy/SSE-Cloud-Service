apiVersion: apps/v1
kind: Deployment
metadata:
  name: coursebot
spec:
  selector:
    matchLabels:
      app: coursebot
  template:
    spec:
      containers:
        - name: coursebot
          workingDir: /app
          # 开发环境特有：增加 --reload 开启热更新
          command: ["uvicorn", "apps.gateway.main:app", 
            "--host", "0.0.0.0", 
            "--port", "8000", 
            "--reload",
            "--reload-dir", "apps/gateway",
            "--reload-dir", "services",
            "--reload-dir", "packages",
            "--reload-dir", "shared"]
          volumeMounts:
            - name: coursebot-code
              mountPath: /app
      volumes:
        - name: coursebot-code
          hostPath:
            # 由 scripts/dev-deploy.ps1 动态注入
            path: ${LOCAL_PROJECT_ROOT}/coursebot
            type: Directory
---
