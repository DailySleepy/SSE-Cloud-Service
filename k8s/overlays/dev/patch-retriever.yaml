apiVersion: apps/v1
kind: Deployment
metadata:
  name: cb-retriever
spec:
  selector:
    matchLabels:
      app: cb-retriever
  template:
    spec:
      containers:
        - name: cb-retriever
          workingDir: /app
          # 开发环境特有：增加 --reload 开启热更新
          command: ["uvicorn", "services.retriever.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
          volumeMounts:
            - name: coursebot-code
              mountPath: /app
      volumes:
        - name: coursebot-code
          hostPath:
            # 由 scripts/dev-deploy.ps1 动态注入
            path: ${LOCAL_PROJECT_ROOT}/coursebot
            type: Directory
