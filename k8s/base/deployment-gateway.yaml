apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx-gateway
          image: nginx:trixie-perl
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            # In Dev mode, dev-guide.html is mounted via volume.
            # We will provide it via config map.
            - name: dev-guide
              mountPath: /usr/share/nginx/html/dev-guide.html
              subPath: dev-guide.html
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            # Items section can be optional if we rely on overlays mapping it.
        - name: dev-guide
          configMap:
            name: dev-guide-config
            optional: true # To allow prod where it's not present
