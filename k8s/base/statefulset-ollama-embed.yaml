apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cb-ollama-embed
spec:
  serviceName: cb-ollama-embed
  replicas: 1
  selector:
    matchLabels:
      app: cb-ollama-embed
  template:
    metadata:
      labels:
        app: cb-ollama-embed
    spec:
      containers:
        - name: cb-ollama-embed
          image: ollama/ollama:0.5.4
          ports:
            - containerPort: 11434
          command: ["/bin/sh", "/mnt/scripts/entrypoint.sh"]
          env:
            - name: OLLAMA_MODEL
              value: "bge-m3"
            - name: OLLAMA_KEEP_ALIVE
              value: "87600h"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_NUM_CTX
              value: "512"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
            - name: scripts
              mountPath: /mnt/scripts
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          startupProbe:
            exec:
              command: ["cat", "/tmp/ollama-ready"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /api/version
              port: 11434
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/version
              port: 11434
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: ollama-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 15Gi
