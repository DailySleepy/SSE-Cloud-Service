apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cb-ollama
spec:
  serviceName: cb-ollama
  replicas: 1
  selector:
    matchLabels:
      app: cb-ollama
  template:
    metadata:
      labels:
        app: cb-ollama
    spec:
      containers:
        - name: cb-ollama
          image: ollama/ollama:0.5.4
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
            # 并发数=2：匹配 2核 CPU Limit，保证每个请求至少独占 1核
            # 比默认的 4 并发更快（否则 4 路抢 2 核，每路只得 0.5 核）
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
            # 上下文窗口=4096：RAG 场景足够（检索块+对话约 1500-2000 tokens）
            # 比默认 8k 节省 ~192MB KV Cache
            - name: OLLAMA_NUM_CTX
              value: "4096"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "500m"
              memory: "3Gi"
            limits:
              cpu: "2000m"
              memory: "6Gi"
          # 就绪探针：Pod 启动时等待 Ollama API 可用，期间不接收流量
          readinessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          # 存活探针：检测 Ollama HTTP 是否仍在响应
          # 当内部 llama_runner 子进程崩溃且 Ollama 进入不可恢复状态时
          # HTTP 服务也会停止响应，此时 K8s 会自动重启整个 Pod
          livenessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 15Gi
