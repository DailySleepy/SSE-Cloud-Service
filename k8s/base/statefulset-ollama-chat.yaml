apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cb-ollama-chat
spec:
  serviceName: cb-ollama-chat
  replicas: 1
  selector:
    matchLabels:
      app: cb-ollama-chat
  template:
    metadata:
      labels:
        app: cb-ollama-chat
    spec:
      containers:
        - name: cb-ollama-chat
          image: ollama/ollama:0.5.4
          ports:
            - containerPort: 11434
          # 自定义启动脚本：拉取模型 → 预热到内存 → 标记就绪
          # startupProbe 保护整个过程，liveness/readiness 在此之前不生效
          command: ["/bin/sh", "/mnt/scripts/entrypoint.sh"]
          env:
            - name: OLLAMA_MODEL
              value: "qwen2.5:0.5b"
            # 使用明确时间单位，"-1" 裸字符串 Ollama 无法解析
            - name: OLLAMA_KEEP_ALIVE
              value: "87600h"
            # chat 专用实例：仅加载 qwen2.5:0.5b，无需多并发
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            # 上下文窗口=4096：RAG 场景足够（检索块+对话约 1500-2000 tokens）
            # 比默认 8k 节省 ~192MB KV Cache
            - name: OLLAMA_NUM_CTX
              value: "4096"
            # 给 Ollama 内部足够的模型加载时间（对应慢速云盘场景）
            - name: OLLAMA_LOAD_TIMEOUT
              value: "15m"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
            - name: scripts
              mountPath: /mnt/scripts
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          # startupProbe：检查标记文件是否存在
          startupProbe:
            exec:
              command: ["cat", "/tmp/ollama-ready"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 90
          # readinessProbe：startupProbe 通过后才启用，控制流量接入
          readinessProbe:
            httpGet:
              path: /api/version
              port: 11434
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          # livenessProbe：运行期健康检测，模型已在内存中响应应很快
          livenessProbe:
            httpGet:
              path: /api/version
              port: 11434
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: ollama-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
