apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cb-ollama-chat
spec:
  serviceName: cb-ollama-chat
  replicas: 1
  selector:
    matchLabels:
      app: cb-ollama-chat
  template:
    metadata:
      labels:
        app: cb-ollama-chat
    spec:
      containers:
        - name: cb-ollama-chat
          image: ollama/ollama:0.5.4
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
            # chat 专用实例：仅加载 qwen2.5:0.5b，无需多并发
            # 设为 1 避免多路 chat 请求同时竞争有限内存
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            # 上下文窗口=4096：RAG 场景足够（检索块+对话约 1500-2000 tokens）
            # 比默认 8k 节省 ~192MB KV Cache
            - name: OLLAMA_NUM_CTX
              value: "4096"
            - name: OLLAMA_MLOCK
              value: "1" # 关键：锁定内存，消除生成时的随机 I/O
            - name: OLLAMA_FLASH_ATTENTION
              value: "1" # 优化推理速度并降低内存占用
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          # 就绪探针：Pod 启动时等待 Ollama API 可用，期间不接收流量
          readinessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 30
          # 存活探针：检测 Ollama HTTP 是否仍在响应
          # 当内部 llama_runner 子进程崩溃且 Ollama 进入不可恢复状态时
          # HTTP 服务也会停止响应，此时 K8s 会自动重启整个 Pod
          livenessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 10
            timeoutSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
