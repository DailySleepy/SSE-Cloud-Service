apiVersion: apps/v1
kind: Deployment
metadata:
  name: coursebot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coursebot
  template:
    metadata:
      labels:
        app: coursebot
    spec:
      containers:
        - name: coursebot
          image: sse-cloud-service_coursebot:latest
          # Default to IfNotPresent, will be overridden or kept in overlays
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            # OPENROUTER_API_KEY is provided by Secret
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cb-secrets
                  key: OPENROUTER_API_KEY
            - name: ENVIRONMENT
              value: "development"
            - name: REDIS_URL
              value: "redis://cb-redis:6379/0"
            - name: OLLAMA_BASE_URL
              value: "http://cb-ollama:11434"
            - name: CHROMA_HOST
              value: "cb-chroma"
            - name: CHROMA_PORT
              value: "8000"
            - name: RETRIEVER_URL
              value: "http://cb-retriever:8000"
            - name: NO_PROXY
              value: "cb-chroma,cb-ollama,cb-retriever,coursebot,cb-ingestor,localhost,127.0.0.1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
