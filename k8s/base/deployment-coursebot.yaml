apiVersion: apps/v1
kind: Deployment
metadata:
  name: coursebot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coursebot
  template:
    metadata:
      labels:
        app: coursebot
    spec:
      containers:
        - name: coursebot
          image: sse-cloud-service_coursebot:latest
          # 显式指定启动命令，保持与 Ingestor/Retriever 风格一致
          command: ["uvicorn", "apps.gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
          # Default to IfNotPresent, will be overridden or kept in overlays
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: COURSEBOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cb-secrets
                  key: COURSEBOT_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cb-secrets
                  key: OPENROUTER_API_KEY
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: cb-config
                  key: REDIS_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: cb-config
                  key: OLLAMA_BASE_URL
            - name: RATE_LIMIT_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: cb-config
                  key: RATE_LIMIT_PER_MINUTE
            - name: FALLBACK_SAAS_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: cb-config
                  key: FALLBACK_SAAS_PROVIDER
            - name: FORCE_OLLAMA_500
              valueFrom:
                configMapKeyRef:
                  name: cb-config
                  key: FORCE_OLLAMA_500
                  optional: true
            - name: OLLAMA_EMBED_URL
              value: "http://cb-ollama-embed:11434"
            - name: CHROMA_HOST
              value: "cb-chroma"
            - name: CHROMA_PORT
              value: "8000"
            - name: RETRIEVER_URL
              value: "http://cb-retriever:8000"
            - name: NO_PROXY
              value: "cb-chroma,cb-ollama-embed,cb-ollama-chat,cb-retriever,coursebot,cb-ingestor,localhost,127.0.0.1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
