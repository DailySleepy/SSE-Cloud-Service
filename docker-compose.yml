services:
  coursebot:
    build:
      context: ./coursebot
    image: sse-cloud-service_coursebot:latest
    container_name: cb_app
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=redis://cb_redis:6379/0
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - RETRIEVER_URL=http://cb_retriever:8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,cb_app,cb_ingestor,localhost,127.0.0.1
    depends_on:
      - cb_redis
      - cb_ollama
      - cb_chroma
      - cb_retriever
    networks:
      - my_network

  cb_ollama:
    image: ollama/ollama:0.5.4
    container_name: cb_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - my_network

  cb_ollama_init:
    image: ollama/ollama:0.5.4
    container_name: cb_ollama_init
    networks:
      - my_network
    depends_on:
      - cb_ollama
    environment:
      - OLLAMA_HOST=http://cb_ollama:11434
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      echo 'Wait for Ollama server...';
      while ! ollama list > /dev/null 2>&1; do
        sleep 2;
      done;
      echo 'Pulling bge-m3 (embedding model)...';
      ollama pull bge-m3;
      echo 'Pulling qwen2.5:0.5b (local LLM)...';
      ollama pull qwen2.5:0.5b;
      echo 'Models pulled successfully!';

  cb_chroma:
    image: chromadb/chroma:latest
    container_name: cb_chroma
    restart: always
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
    ports:
      - "8000:8000"
    networks:
      - my_network

  cb_ingestor:
    build:
      context: ./coursebot
      dockerfile: Dockerfile.ingestor
    image: sse-cloud-service_ingestor:latest
    container_name: cb_ingestor
    restart: always
    environment:
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,coursebot,cb_ingestor,localhost,127.0.0.1
      - REDIS_URL=redis://cb_redis:6379/0
    depends_on:
      - cb_ollama
      - cb_chroma
      - cb_redis
    networks:
      - my_network

  cb_retriever:
    build:
      context: ./coursebot
      dockerfile: Dockerfile.retriever
    image: sse-cloud-service_retriever:latest
    container_name: cb_retriever
    restart: always
    environment:
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,coursebot,cb_ingestor,localhost,127.0.0.1
    depends_on:
      - cb_ollama
      - cb_chroma
    networks:
      - my_network

  cb_redis:
    image: redis:7-alpine
    container_name: cb_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - my_network


  nginx:
    image: nginx:trixie-perl
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html/dev-guide.html:/usr/share/nginx/html/dev-guide.html:ro

    depends_on:
      - coursebot

    networks:
      - my_network

volumes:
  ollama_data:
  redis_data:
  chroma_data:


networks:
  my_network:
    driver: bridge
