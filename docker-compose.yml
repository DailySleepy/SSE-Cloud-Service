services:
  db:
    image: mariadb:10.6
    container_name: mdb_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - my_network

  wordpress:
    image: wordpress:6-apache
    container_name: wp_app
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      # Nginx 会将请求代理过来，如果不做此配置，访问 /blog 时 wordpress 加载静态资源会指向根路径出现 404
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME','http://${SERVER_HOST:-localhost}/blog');
        define('WP_SITEURL','http://${SERVER_HOST:-localhost}/blog');
        $$_SERVER['REQUEST_URI'] = str_replace("/wp-admin/", "/blog/wp-admin/", $$_SERVER['REQUEST_URI']);
    volumes:
      - wp_data:/var/www/html
    networks:
      - my_network

  coursebot:
    build:
      context: ./coursebot
    image: sse-cloud-service_coursebot:latest
    container_name: cb_app
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=redis://cb_redis:6379/0
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - RETRIEVER_URL=http://cb_retriever:8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,cb_app,cb_ingestor,localhost,127.0.0.1
    depends_on:
      - cb_redis
      - cb_ollama
      - cb_chroma
      - cb_retriever
    networks:
      - my_network

  cb_ollama:
    image: ollama/ollama:0.5.4
    container_name: cb_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - my_network

  cb_chroma:
    image: chromadb/chroma:latest
    container_name: cb_chroma
    restart: always
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
    ports:
      - "8000:8000"
    networks:
      - my_network

  cb_ingestor:
    build:
      context: ./coursebot
      dockerfile: Dockerfile.ingestor
    image: sse-cloud-service_ingestor:latest
    container_name: cb_ingestor
    restart: always
    environment:
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,coursebot,cb_ingestor,localhost,127.0.0.1
      - REDIS_URL=redis://cb_redis:6379/0
    depends_on:
      - cb_ollama
      - cb_chroma
      - cb_redis
    networks:
      - my_network

  cb_retriever:
    build:
      context: ./coursebot
      dockerfile: Dockerfile.retriever
    image: sse-cloud-service_retriever:latest
    container_name: cb_retriever
    restart: always
    environment:
      - OLLAMA_BASE_URL=http://cb_ollama:11434
      - CHROMA_HOST=cb_chroma
      - CHROMA_PORT=8000
      - NO_PROXY=cb_chroma,cb_ollama,cb_retriever,coursebot,cb_ingestor,localhost,127.0.0.1
    depends_on:
      - cb_ollama
      - cb_chroma
    networks:
      - my_network

  cb_redis:
    image: redis:7-alpine
    container_name: cb_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - my_network

  frontend:
    build:
      context: ./frontend
    image: sse-cloud-service_frontend:latest
    container_name: cb_frontend
    restart: always
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks:
      - my_network

  nginx:
    image: nginx:trixie-perl
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - wordpress
      - coursebot
      - frontend
    networks:
      - my_network

volumes:
  db_data:
  wp_data:
  ollama_data:
  redis_data:
  chroma_data:
  frontend_dist:

networks:
  my_network:
    driver: bridge
